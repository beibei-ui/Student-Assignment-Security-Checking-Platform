name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install all test deps in a single pip invocation.
      # Splitting into two steps caused boto3/moto module conflicts:
      # "No module named 'boto3.dynamodb.table'; 'boto3.dynamodb' is not a package"
      # Installing together lets pip resolve a consistent dependency set.
      # bandit and semgrep are excluded — unit tests mock subprocess.run.
      - name: Install test dependencies
        run: pip install -r sast-platform/requirements-ci.txt

      - name: Run unit tests
        run: |
          cd sast-platform
          # test_lambda_a.py is a legacy script runner (no pytest-discoverable
          # tests). When pytest imports it, the module-level
          # sys.modules["boto3"] = MagicMock() corrupts real boto3 for the
          # entire process, breaking all moto-based tests. Ignore it until it
          # is rewritten as proper pytest (tracked in PR #37).
          python -m pytest tests/unit/ --ignore=tests/unit/test_lambda_a.py -v --tb=short
        env:
          # moto intercepts boto3 calls — no real AWS credentials needed.
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
